{% extends "travel_wishlist/base.html" %}

{% block content %}
<h2>Visited Places</h2>

{% if visited %}
    <ul>
    {% for place in visited %}

        <li>
            <a href="{% url 'place_details' place.pk %}">{{ place.name }}</a>
        </li>

    {% endfor %}
    </ul>

{% else %}
    <p>No places have been visited yet.</p>
{% endif %}

{% endblock %}
